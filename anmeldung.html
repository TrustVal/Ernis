<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmeldung — Erni's - ForeverYoung</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="header-brand">
      <img src="assets/images/ernislogo.svg" alt="Erni's - ForeverYoung" />
      <span>Erni's - ForeverYoung</span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">START</a></li>
        <li><a href="details.html">DETAILS</a></li>
        <li class="active"><a href="anmeldung.html">ANMELDUNG</a></li>
        <li><a href="login.html">LOGIN</a></li>
      </ul>
    </nav>
  </header>

  <!-- PAGE BODY -->
  <div class="page-body">

    <main>

      <!-- Divider Heading -->
      <div class="divider-heading">
        <h2>Anmeldung bis am 10. 05.2026</h2>
      </div>

      <!-- Form -->
      <section class="form-section">
        <div class="container" style="max-width: 600px;">

          <h3>Anmeldung</h3>

          <!-- Thank-you message (hidden until submit) -->
          <div id="thankYou" style="display:none; text-align:center; padding: 40px 0;">
            <p style="font-family:var(--font1); font-size:1.6rem; font-weight:800; color:var(--color1); margin-bottom:12px;">Danke für deine Anmeldung! 🎉</p>
            <p style="font-family:var(--font2); color:#555;">Wir freuen uns auf euch am 27. Juni 2026!</p>
          </div>

          <form id="anmeldungForm" novalidate>

            <!-- Vorname + Nachname row -->
            <div class="form-row">
              <div class="form-group">
                <input type="text" id="vorname" name="vorname" placeholder="Vorname" required />
              </div>
              <div class="form-group">
                <input type="text" id="nachname" name="nachname" placeholder="Nachname" required />
              </div>
            </div>

            <!-- E-Mail + Telefon row -->
            <div class="form-row">
              <div class="form-group">
                <input type="email" id="email" name="email" placeholder="E-Mail" />
              </div>
              <div class="form-group">
                <input type="text" id="telefon" name="telefon" placeholder="Telefon" />
              </div>
            </div>

            <!-- Optionen -->
            <span class="form-label-group">Optionen</span>
            <div class="checkbox-group">
              <input type="checkbox" id="bus" name="bus" value="Ja" />
              <label for="bus">Ich/wir möchten mit dem Bus um 22.00h zurückfahren</label>
            </div>

            <!-- Mitteilung -->
            <div class="form-group" style="margin-top: 12px;">
              <textarea id="mitteilung" name="mitteilung" placeholder="Mitteilung" rows="4"></textarea>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit" id="submitBtn">Anmelden</button>

          </form>

          <script>
            document.getElementById('anmeldungForm').addEventListener('submit', async function(e) {
              e.preventDefault();
              const btn = document.getElementById('submitBtn');
              btn.disabled = true;
              btn.textContent = 'Wird gesendet…';

              const vorname    = document.getElementById('vorname').value.trim();
              const nachname   = document.getElementById('nachname').value.trim();
              const email      = document.getElementById('email').value.trim();
              const telefon    = document.getElementById('telefon').value.trim();
              const bus        = document.getElementById('bus').checked;
              const mitteilung = document.getElementById('mitteilung').value.trim();

              if (!vorname || !nachname) {
                btn.disabled = false;
                btn.textContent = 'Anmelden';
                alert('Bitte Vor- und Nachname eingeben.');
                return;
              }

              // 1) Save to admin guest list in localStorage
              try {
                const key = 'ernis_guests_cache';
                const guests = JSON.parse(localStorage.getItem(key) || '[]');
                guests.push({ vorname, nachname, telefon, bus, mitteilung });
                localStorage.setItem(key, JSON.stringify(guests));
              } catch(err) {}

              // 2) Send email via Formspree
              try {
                await fetch('https://formspree.io/f/xykblpnb', {
                  method: 'POST',
                  headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    _subject: 'Neue Anmeldung: ' + vorname + ' ' + nachname,
                    Vorname: vorname,
                    Nachname: nachname,
                    'E-Mail': email || '—',
                    Telefon: telefon || '—',
                    'Bus 22:00h': bus ? 'Ja' : 'Nein',
                    Mitteilung: mitteilung || '—'
                  })
                });
              } catch(err) {}

              // 3) Show thank-you
              document.getElementById('anmeldungForm').style.display = 'none';
              document.getElementById('thankYou').style.display = 'block';
            });
          </script>

        </div>
      </section>

    </main>

    <!-- FOOTER -->
    <footer>
      <div class="footer-inner">
        <p class="footer-name">Othmar und Christin Erni</p>
        <p class="footer-location">Adligenswil, Schweiz</p>
        <p class="footer-copy">Copyright Erni's 2025, Alle Rechte vorbehalten</p>
      </div>
    </footer>

  </div><!-- /.page-body -->
</body>
</html>
