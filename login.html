<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Erni's - ForeverYoung</title>
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .login-wrap {
      min-height: calc(100vh - 64px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .login-box {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-box h2 {
      font-family: var(--font1);
      font-size: 1.8rem;
      font-weight: 800;
      color: #222;
      margin-bottom: 8px;
    }
    .login-box p {
      font-family: var(--font2);
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 28px;
    }
    .login-box input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ccc;
      font-family: var(--font2);
      font-size: 1rem;
      color: #333;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .login-box input[type="password"]:focus {
      border-color: var(--color1);
    }
    .login-box button {
      width: 100%;
      padding: 13px;
      background: var(--color1);
      color: #fff;
      border: none;
      font-family: var(--font1);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: #3db5e8; }
    .login-error {
      color: #e53e3e;
      font-family: var(--font2);
      font-size: 0.85rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="header-brand">
      <img src="assets/images/ernislogo.svg" alt="Erni's - ForeverYoung" />
      <span>Erni's - ForeverYoung</span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">START</a></li>
        <li><a href="details.html">DETAILS</a></li>
        <li><a href="anmeldung.html">ANMELDUNG</a></li>
        <li class="active"><a href="login.html">LOGIN</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-body">
    <div class="login-wrap">
      <div class="login-box">
        <h2>Admin-Bereich</h2>
        <p>Bitte Passwort eingeben, um die Gästeliste zu öffnen.</p>
        <input type="password" id="pwInput" placeholder="Passwort" />
        <button onclick="checkPassword()">Anmelden</button>
        <p class="login-error" id="loginError">Falsches Passwort. Bitte nochmals versuchen.</p>
      </div>
    </div>
    <footer>
      <div class="footer-inner">
        <p class="footer-name">Othmar und Christin Erni</p>
        <p class="footer-location">Adligenswil, Schweiz</p>
        <p class="footer-copy">Copyright Erni's 2025, Alle Rechte vorbehalten</p>
      </div>
    </footer>
  </div>

  <script>
    // If already authenticated in this session, go straight to admin
    if (sessionStorage.getItem('ernis_auth') === 'ok') {
      window.location.href = 'admin.html';
    }

    document.getElementById('pwInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      const val = document.getElementById('pwInput').value;
      if (val === '4Everyoung') {
        sessionStorage.setItem('ernis_auth', 'ok');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
      }
    }
  </script>
</body>
</html>
